name: Installer Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  installer_release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build installer + portable
        run: |
          npm run pack
          powershell -Command "Compress-Archive -Path dist\\win-unpacked\\* -DestinationPath dist\\RustyPlayer-Portable.zip"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: iscc installer.iss

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-files
          path: |
            dist/RustyPlayer-Portable.zip
            dist/win-unpacked/RustyPlayer.exe
            dist/rustyplayer-setup-*.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v4
        with:
          files: |
            dist/RustyPlayer-Portable.zip
            dist/win-unpacked/RustyPlayer.exe
            dist/rustyplayer-setup-*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
