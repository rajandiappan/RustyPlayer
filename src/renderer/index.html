<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; media-src 'self' file:">
  <title>RustyPlayer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <div class="sidebar" id="sidebar">
      <div class="toolbar">
        <button id="openFolderBtn" class="btn">Open Folder</button>
        <input type="text" id="searchInput" class="search-input" placeholder="Search...">
      </div>
      <div class="folder-info" id="folderInfo"></div>
      <div class="gallery" id="gallery"></div>
    </div>
    <div class="resize-handle" id="resizeHandle"></div>
    <div class="player" id="player">
      <div class="video-wrapper">
        <video id="videoPlayer" class="video-element"></video>
      </div>
      <div class="controls">
        <button id="playPauseBtn" class="control-btn">Play</button>
        <input type="range" id="seekBar" class="seek-bar" min="0" max="100" value="0">
        <span id="timeDisplay">0:00 / 0:00</span>
        <input type="range" id="volumeBar" class="volume-bar" min="0" max="100" value="100">
        <button id="autoAdvanceBtn" class="control-btn">Auto</button>
      </div>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
